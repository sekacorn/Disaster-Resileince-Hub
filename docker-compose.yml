version: '3.8'

services:
  # ============================================
  # DATABASE SERVICES
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: drh-postgres
    environment:
      POSTGRES_DB: disaster_resilience
      POSTGRES_USER: drh_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - drh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drh_user -d disaster_resilience"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: drh-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # BACKEND MICROSERVICES
  # ============================================

  user-session:
    build:
      context: ./backend/user-session
      dockerfile: Dockerfile
    container_name: drh-user-session
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/disaster_resilience
      SPRING_DATASOURCE_USERNAME: drh_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_password}
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_key_minimum_256_bits_for_hs256}
      JWT_EXPIRATION: 3600000
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  disaster-integrator:
    build:
      context: ./backend/disaster-integrator
      dockerfile: Dockerfile
    container_name: drh-disaster-integrator
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/disaster_resilience
      SPRING_DATASOURCE_USERNAME: drh_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_key_minimum_256_bits_for_hs256}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      user-session:
        condition: service_healthy
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  disaster-visualizer:
    build:
      context: ./backend/disaster-visualizer
      dockerfile: Dockerfile
    container_name: drh-disaster-visualizer
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/disaster_resilience
      SPRING_DATASOURCE_USERNAME: drh_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_key_minimum_256_bits_for_hs256}
      AI_SERVICE_URL: http://ai-model:8000
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      ai-model:
        condition: service_healthy
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llm-service:
    build:
      context: ./backend/llm-service
      dockerfile: Dockerfile
    container_name: drh-llm-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/disaster_resilience
      SPRING_DATASOURCE_USERNAME: drh_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_key_minimum_256_bits_for_hs256}
      LLM_API_KEY: ${LLM_API_KEY:-your_xai_or_huggingface_api_key}
      LLM_PROVIDER: ${LLM_PROVIDER:-huggingface}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  collaboration-service:
    build:
      context: ./backend/collaboration-service
      dockerfile: Dockerfile
    container_name: drh-collaboration-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/disaster_resilience
      SPRING_DATASOURCE_USERNAME: drh_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_password}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_key_minimum_256_bits_for_hs256}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: drh-api-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_key_minimum_256_bits_for_hs256}
      USER_SESSION_URL: http://user-session:8081
      DISASTER_INTEGRATOR_URL: http://disaster-integrator:8082
      DISASTER_VISUALIZER_URL: http://disaster-visualizer:8083
      LLM_SERVICE_URL: http://llm-service:8084
      COLLABORATION_SERVICE_URL: http://collaboration-service:8085
      AI_MODEL_URL: http://ai-model:8000
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
    ports:
      - "8080:8080"
    depends_on:
      - user-session
      - disaster-integrator
      - disaster-visualizer
      - llm-service
      - collaboration-service
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # AI MODEL SERVICE (Python/FastAPI)
  # ============================================

  ai-model:
    build:
      context: ./ai-model
      dockerfile: Dockerfile
    container_name: drh-ai-model
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: disaster_resilience
      POSTGRES_USER: drh_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      MODEL_VERSION: "1.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - drh-network
    volumes:
      - ai-models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # FRONTEND (React + Three.js)
  # ============================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drh-frontend
    environment:
      REACT_APP_API_GATEWAY_URL: http://localhost:8080
      REACT_APP_AI_SERVICE_URL: http://localhost:8000
      REACT_APP_WEBSOCKET_URL: ws://localhost:8085/ws
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # NGINX REVERSE PROXY
  # ============================================

  nginx:
    image: nginx:alpine
    container_name: drh-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - drh-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================
# NETWORKS
# ============================================

networks:
  drh-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================
# VOLUMES
# ============================================

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ai-models:
    driver: local
