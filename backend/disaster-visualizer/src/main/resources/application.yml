server:
  port: 8083
  servlet:
    context-path: /api/visualizer

spring:
  application:
    name: disaster-visualizer

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:disaster_resilience_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-environment}
  expiration: 86400000 # 24 hours in milliseconds

# Visualization Configuration
visualization:
  max-map-size-km: 500
  default-radius-km: 50
  max-concurrent-renders: 10
  render-timeout-seconds: 300
  cache-ttl-minutes: 60

  # Export settings
  export:
    max-file-size-mb: 100
    png:
      max-width: 4096
      max-height: 4096
      default-dpi: 300
    svg:
      max-width: 8192
      max-height: 8192
    stl:
      max-vertices: 1000000

# Resource monitoring
monitoring:
  enabled: true
  interval-seconds: 30
  thresholds:
    cpu-warning: 70
    cpu-critical: 90
    memory-warning: 75
    memory-critical: 90
    gpu-warning: 80
    gpu-critical: 95

# MBTI Visualization Preferences
