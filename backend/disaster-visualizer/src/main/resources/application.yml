      style: collaborative
      colors: warm
      detail-level: medium
      data-emphasis: people
    INFJ:
      style: insightful
      colors: subtle
      detail-level: high
      data-emphasis: meaning
    ENTP:
      style: innovative
      colors: dynamic
      detail-level: medium
      data-emphasis: possibilities
    INTP:
      style: logical
      colors: neutral
      detail-level: very-high
      data-emphasis: systems
    ENFP:
      style: creative
      colors: vibrant
      detail-level: medium
      data-emphasis: stories
    INFP:
      style: creative
      colors: harmonious
      detail-level: high
      data-emphasis: values
    ESTJ:
      style: practical
      colors: traditional
      detail-level: medium
      data-emphasis: facts
    ISTJ:
      style: detailed
      colors: conservative
      detail-level: very-high
      data-emphasis: accuracy
    ESFJ:
      style: supportive
      colors: friendly
      detail-level: medium
      data-emphasis: community
    ISFJ:
      style: thorough
      colors: gentle
      detail-level: high
      data-emphasis: safety
    ESTP:
      style: action-oriented
      colors: energetic
      detail-level: low
      data-emphasis: immediate
    ISTP:
      style: efficient
      colors: minimal
