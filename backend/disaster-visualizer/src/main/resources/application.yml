      detail-level: medium
      data-emphasis: beauty

# Disaster Data Integration
disaster-integrator:
  base-url: ${DISASTER_INTEGRATOR_URL:http://localhost:8082}
  timeout-seconds: 30
  retry-attempts: 3

# Logging
logging:
  level:
    com.disaster.visualizer: ${LOG_LEVEL:INFO}
    org.springframework.web: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/disaster-visualizer.log
    max-size: 10MB
    max-history: 30

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
