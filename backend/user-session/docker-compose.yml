version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: disaster-hub-postgres
    environment:
      POSTGRES_DB: disaster_resilience_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../database/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: disaster-hub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # User Session Microservice
  user-session:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: disaster-hub-user-session
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/disaster_resilience_hub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: c2VjcmV0a2V5Zm9yZGlzYXN0ZXJyZXNpbGllbmNlaHViYXBwbGljYXRpb25zZWN1cml0eXRva2VuZ2VuZXJhdGlvbg==
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 604800000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres-data:
  redis-data:

networks:
  default:
    name: disaster-hub-network
