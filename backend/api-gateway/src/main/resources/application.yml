server:
  port: 8080
  http2:
    enabled: true
  compression:
    enabled: true
    min-response-size: 1024

spring:
  application:
    name: api-gateway

  # Redis Configuration for Rate Limiting
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
      shutdown-timeout: 100ms

  # Cloud Gateway Configuration
  cloud:
    gateway:
      # Global CORS Configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "https://*.disaster-resilience-hub.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - X-RateLimit-Limit
              - X-RateLimit-Remaining
              - X-RateLimit-Reset
              - Retry-After
            allowCredentials: true
            maxAge: 3600

      # Discovery Locator (optional - for service discovery)
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true

      # Default Filters
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      # HTTP Client Configuration
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
        pool:
          type: elastic
          max-idle-time: 30s
          max-life-time: 60s

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationAndValidationMustBeLongEnough}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in milliseconds

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      auth-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
        recordExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException

      users-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

      integrator-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 15
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

      visualizer-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 15
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

      llm-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 60s
        failureRateThreshold: 60
        slowCallRateThreshold: 70
        slowCallDurationThreshold: 10s
        eventConsumerBufferSize: 10

      collaboration-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

      ai-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 60s
        failureRateThreshold: 60
        slowCallRateThreshold: 70
        slowCallDurationThreshold: 15s
        eventConsumerBufferSize: 10

  # Time Limiter Configuration
  timelimiter:
    instances:
      auth-circuit-breaker:
        timeoutDuration: 10s
      users-circuit-breaker:
        timeoutDuration: 10s
      integrator-circuit-breaker:
        timeoutDuration: 15s
      visualizer-circuit-breaker:
        timeoutDuration: 15s
      llm-circuit-breaker:
        timeoutDuration: 30s
      collaboration-circuit-breaker:
        timeoutDuration: 10s
      ai-circuit-breaker:
        timeoutDuration: 30s

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}

# Logging Configuration
logging:
  level:
    root: INFO
    com.disaster.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/api-gateway.log
    max-size: 10MB
    max-history: 30

# Service Endpoints (can be overridden with environment variables)
services:
  user-session:
    host: ${USER_SESSION_HOST:user-session}
    port: ${USER_SESSION_PORT:8081}
  disaster-integrator:
    host: ${DISASTER_INTEGRATOR_HOST:disaster-integrator}
    port: ${DISASTER_INTEGRATOR_PORT:8082}
  disaster-visualizer:
    host: ${DISASTER_VISUALIZER_HOST:disaster-visualizer}
    port: ${DISASTER_VISUALIZER_PORT:8083}
  llm-service:
    host: ${LLM_SERVICE_HOST:llm-service}
    port: ${LLM_SERVICE_PORT:8084}
  collaboration-service:
    host: ${COLLABORATION_SERVICE_HOST:collaboration-service}
    port: ${COLLABORATION_SERVICE_PORT:8085}
  ai-model:
    host: ${AI_MODEL_HOST:ai-model}
    port: ${AI_MODEL_PORT:8000}
