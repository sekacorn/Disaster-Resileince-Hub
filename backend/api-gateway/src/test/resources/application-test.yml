server:
  port: 0 # Random port for testing

spring:
  application:
    name: api-gateway-test

  # Embedded Redis for testing
  redis:
    host: localhost
    port: 6379
    database: 1

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

# JWT Configuration for tests
jwt:
  secret: YourSuperSecretKeyForJWTTokenGenerationAndValidationMustBeLongEnough
  expiration: 86400000
  refresh-expiration: 604800000

# Logging for tests
logging:
  level:
    root: INFO
    com.disaster.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
