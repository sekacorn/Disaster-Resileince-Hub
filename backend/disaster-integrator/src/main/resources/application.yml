spring:
  application:
    name: disaster-integrator

  datasource:
    url: jdbc:postgresql://localhost:5432/disaster_resilience
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8082
  servlet:
    context-path: /api/integrator

security:
  jwt:
    secret: ${JWT_SECRET:disaster-resilience-hub-super-secret-key-change-in-production}
    expiration: 86400000

logging:
  level:
    com.disaster.integrator: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

data:
  validation:
    max-temperature: 60.0
    min-temperature: -90.0
    max-magnitude: 10.0
    min-magnitude: 0.0

  sources:
    noaa:
      enabled: true
      timeout: 30000
    usgs:
      enabled: true
      timeout: 30000
    osm:
      enabled: true
      timeout: 30000
    fhir:
      enabled: true
      timeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
