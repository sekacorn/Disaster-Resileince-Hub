spring:
  application:
    name: disaster-integrator-test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

security:
  jwt:
    secret: test-secret-key-for-disaster-resilience-hub

logging:
  level:
    com.disaster.integrator: DEBUG
    org.springframework.web: DEBUG

data:
  validation:
    max-temperature: 60.0
    min-temperature: -90.0
    max-magnitude: 10.0
    min-magnitude: 0.0
